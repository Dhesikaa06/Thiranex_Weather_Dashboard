<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="description"
content="Weather Dashboard by Dhesikaa Venkatesan">

<meta name="keywords"
content="Weather Dashboard, HTML, CSS, JavaScript">

<meta name="author"
content="Dhesikaa Venkatesan">

<title>Weather Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<div class="container">

<h1>

🌦 Weather Dashboard

</h1>

<p>

Developed by Dhesikaa Venkatesan

</p>

</div>

</header>

<main>

<section class="search-box">

<input
type="text"
id="cityInput"
placeholder="Enter City Name">

<button
id="searchBtn">

Search

</button>

</section>

<section
id="loading"
class="loading">

Loading Weather...

</section>

<section
id="error"
class="error">

City not found!

</section>

<section
id="weatherCard"
class="weather-card">

<h2
id="cityName">

City Name

</h2>

<img
id="weatherIcon"
src=""
alt="Weather Icon">

<p>

🌡 Temperature :

<span id="temperature">

--

</span>

°C

</p>

<p>

💧 Humidity :

<span id="humidity">

--

</span>

%

</p>

<p>

💨 Wind Speed :

<span id="wind">

--

</span>

km/h

</p>

<p>

🌥 Condition :

<span id="condition">

--

</span>

</p>

<p>

🌍 Country :

<span id="country">

--

</span>

</p>

</section>

</main>

<footer>

<p>

© 2026 Dhesikaa Venkatesan

</p>

<p>

Thiranex Internship - Task 4

</p>

</footer>

<script src="script.js"></script>

</body>

</html>
